services:
  # ============================================
  # Apache Kafka (KRaft Mode - Official Image)
  # ============================================
  kafka:
    image: apache/kafka:3.9.0
    container_name: aegis-kafka
    hostname: kafka
    ports:
      - "9094:9094"       # External host access
    environment:
      # KRaft Configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Listeners - separate INTERNAL (Docker) and EXTERNAL (host)
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Topic Configuration
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Cluster ID (required for KRaft)
      CLUSTER_ID: "AegisKafkaCluster001xyzw"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:29092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - aegis-network

  # ============================================
  # Kafka UI (Kafdrop) - Message Visualization
  # ============================================
  kafka-ui:
    image: obsidiandynamics/kafdrop:4.0.2
    container_name: aegis-kafka-ui
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - aegis-network

  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aegis-network

volumes:
  kafka_data:
    driver: local
  postgres_data:
    driver: local

networks:
  aegis-network:
    driver: bridge
