spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT settings
jwt.secret=${JWT_SECRET:test-only-jwt-secret-not-for-production-use-0000000000}
jwt.expiration=86400000

# Aegis Security Sync Token for Microservice Authentication
aegis.security.sync-token=${AEGIS_SECURITY_SYNC_TOKEN:test-only-not-for-production}

# Disable Kafka in test profile (no broker needed for unit tests)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
