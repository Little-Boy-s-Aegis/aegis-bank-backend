server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:bankdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
# Auto-detected by Spring Boot based on JDBC URL (Postgres in Docker, H2 in memory)
# spring.datasource.driverClassName and database-platform are auto-selected
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT settings
jwt.secret=${JWT_SECRET:fced6e99c8cd41e3cb408c102c0bd5aa788fbf209dbedc66fec02c827311b751}
jwt.expiration=86400000

# Aegis Security Sync Token for Microservice Authentication
aegis.security.sync-token=${AEGIS_SECURITY_SYNC_TOKEN:1f6fbd7dc0b2d9818ba0c0c9d7e1500e7656d202dd9fcb9aa037408d1f88d968}

# Kafka Producer Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=1
spring.kafka.producer.retries=0
spring.kafka.producer.properties.max.block.ms=100
