name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-build:
    name: Run Tests & Build JAR
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Run Unit & Integration Tests
      run: mvn clean test

    - name: Package Application
      run: mvn package -DskipTests

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v6
      with:
        name: bank-demo-jar
        path: target/*.jar

  docker-build-scan:
    name: Docker Build, Scan & Push to Docker Hub
    needs: test-and-build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Download Build Artifact
      uses: actions/download-artifact@v7
      with:
        name: bank-demo-jar
        path: target/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Docker Hub
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_HUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
        tags: |
          ${{ secrets.DOCKER_HUB_USERNAME }}/aegis-bank-backend:latest
          ${{ secrets.DOCKER_HUB_USERNAME }}/aegis-bank-backend:${{ github.sha }}

    - name: Run Trivy Vulnerability Scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/aegis-bank-backend:${{ github.sha }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
